<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>devodrag</title>
    <!-- Подключаем оригинальный шрифт Apple San Francisco (SF Pro Display) -->
    <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">
    <!-- Подключаем актуальные иконки FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #ff7e5f, #feb47b, #ffcc33);
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-shadow: rgba(254, 180, 123, 0.15);
            --text-main: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.7);
            --accent-yellow: #ffcc33;
            --particle-color: rgba(255, 204, 51, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Строго без скролла */
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #110905;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Анимированный летний бэкграунд (Liquid Blobs) */
        .background-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            filter: blur(80px);
            background: radial-gradient(circle at 50% 50%, #200b00, #0c0502);
        }

        .blob {
            position: absolute;
            background: linear-gradient(45deg, #ff4e50, #f9d423);
            border-radius: 50%;
            mix-blend-mode: screen;
            opacity: 0.5;
            animation: moveBlob 25s ease-in-out infinite alternate;
        }

        .blob:nth-child(1) {
            width: 500px;
            height: 500px;
            top: -10%;
            left: -10%;
            background: linear-gradient(135deg, #ff8c00, #e52d27);
            animation-duration: 20s;
        }

        .blob:nth-child(2) {
            width: 450px;
            height: 450px;
            bottom: -10%;
            right: -5%;
            background: linear-gradient(135deg, #ffcc33, #ffb347);
            animation-duration: 28s;
            animation-delay: -5s;
        }

        .blob:nth-child(3) {
            width: 300px;
            height: 300px;
            top: 40%;
            left: 50%;
            background: linear-gradient(135deg, #ff512f, #dd2476);
            animation-duration: 22s;
            animation-delay: -10s;
        }

        @keyframes moveBlob {
            0% { transform: translate(0px, 0px) scale(1) rotate(0deg); }
            33% { transform: translate(100px, -80px) scale(1.2) rotate(120deg); }
            66% { transform: translate(-60px, 60px) scale(0.8) rotate(240deg); }
            100% { transform: translate(0px, 0px) scale(1) rotate(360deg); }
        }

        /* Солнечные частицы на фоне */
        .particle-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }
        .particle {
            position: absolute;
            background: var(--particle-color);
            border-radius: 50%;
            filter: blur(1px);
            animation: floatParticle linear infinite;
        }
        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* Главный контейнер iOS 26 Liquid Glass */
        .glass-wrapper {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 420px;
            padding: 35px 25px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 38px;
            backdrop-filter: blur(30px) saturate(210%);
            -webkit-backdrop-filter: blur(30px) saturate(210%);
            box-shadow: 
                0 4px 30px rgba(0, 0, 0, 0.4),
                inset 0 1px 2px rgba(255, 255, 255, 0.2),
                inset 0 -1px 20px rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        /* Общая анимация появления элементов */
        .element-appear {
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            animation: cardAppear 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cardAppear {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Аватарка с жидким свечением */
        .avatar-holder {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 20px;
            animation-delay: 0.1s;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.4);
            position: relative;
            z-index: 2;
        }

        .avatar-glow {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #ffcc33, #ff4e50);
            border-radius: 50%;
            filter: blur(15px);
            opacity: 0.6;
            z-index: 1;
            animation: pulseGlow 4s ease-in-out infinite alternate;
        }

        @keyframes pulseGlow {
            0% { transform: scale(0.95); opacity: 0.5; }
            100% { transform: scale(1.1); opacity: 0.8; }
        }

        /* Жирные шрифты по канону Apple */
        h1 {
            font-size: 2.4em;
            font-weight: 800; /* Максимально жирный акцентный заголовок */
            letter-spacing: -0.8px;
            margin-bottom: 4px;
            background: linear-gradient(180deg, #ffffff 0%, #ffe5b4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation-delay: 0.3s;
        }

        .tagline {
            font-size: 1.1em;
            color: var(--accent-yellow);
            font-weight: 700; /* Плотный Bold подзаголовок */
            margin-bottom: 6px;
            letter-spacing: -0.2px;
            animation-delay: 0.4s;
        }

        .location {
            font-size: 0.95em;
            color: var(--text-sub);
            font-weight: 600; /* Полужирный для локации */
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 30px;
            animation-delay: 0.5s;
        }

        /* Кнопки в стиле iOS Liquid Glass */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
            animation-delay: 0.6s;
        }

        .ios-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-main);
            text-decoration: none;
            font-size: 1.1em;
            font-weight: 700; /* Делаем текст кнопок отчетливо жирным */
            letter-spacing: -0.3px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(10px);
        }

        .ios-btn .left-side {
            display: flex;
            align-items: center;
            gap: 14px;
            transition: transform 0.3s ease;
        }

        .ios-btn i {
            font-size: 1.25em;
            transition: all 0.3s ease;
        }

        .ios-btn .fa-chevron-right {
            font-size: 0.85em;
            opacity: 0.4;
            transition: all 0.3s ease;
        }

        /* Ховеры */
        .ios-btn-tg:hover {
            background: rgba(0, 136, 204, 0.15);
            border-color: rgba(0, 136, 204, 0.4);
            box-shadow: 0 10px 25px rgba(0, 136, 204, 0.2);
            transform: translateY(-2px);
        }
        .ios-btn-tg:hover .fa-telegram {
            color: #24A1DE;
            transform: scale(1.1);
        }

        .ios-btn-gh:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }
        .ios-btn-gh:hover .fa-github {
            transform: scale(1.1);
        }

        .ios-btn:hover .left-side {
            transform: translateX(3px);
        }
        .ios-btn:hover .fa-chevron-right {
            transform: translateX(-3px);
            opacity: 0.8;
        }

        .ios-btn:active {
            transform: scale(0.98) translateY(0);
        }

        /* Солнечные лучи */
        .sunlight {
            position: absolute;
            top: -20%;
            right: -20%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(255,204,51,0.15) 0%, transparent 70%);
            z-index: 2;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Жидкий фон -->
    <div class="background-canvas">
        <div class="blob"></div>
        <div class="blob"></div>
        <div class="blob"></div>
    </div>
    
    <!-- Солнечные частицы -->
    <div class="particle-container" id="particles"></div>

    <div class="sunlight"></div>

    <!-- Основной интерфейс -->
    <div class="glass-wrapper">
        <div class="avatar-holder element-appear">
            <div class="avatar-glow"></div>
            <img src="avatar.jpg" alt="devodrag" class="avatar" onerror="this.src='https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=150&auto=format&fit=crop&q=80'">
        </div>

        <h1 class="element-appear">devodrag</h1>
        <p class="tagline element-appear">Full Stack Developer</p>
        
        <div class="location element-appear">
            <i class="fas fa-location-dot" style="color: #ff4e50;"></i>
            <span>Latvia</span>
        </div>

        <!-- Кнопки-ссылки -->
        <div class="links-container element-appear">
            <a href="https://t.me/swiftlose" target="_blank" class="ios-btn ios-btn-tg">
                <div class="left-side">
                    <i class="fab fa-telegram"></i>
                    <span>Telegram</span>
                </div>
                <i class="fas fa-chevron-right"></i>
            </a>

            <a href="https://github.com/devodrag" target="_blank" class="ios-btn ios-btn-gh">
                <div class="left-side">
                    <i class="fab fa-github"></i>
                    <span>GitHub</span>
                </div>
                <i class="fas fa-chevron-right"></i>
            </a>
        </div>
    </div>

    <script>
        // Генерируем солнечные частицы на фоне
        const particleContainer = document.getElementById('particles');
        const particleCount = 50;

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            const size = Math.random() * 5 + 2 + 'px';
            particle.style.width = size;
            particle.style.height = size;
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.animationDuration = Math.random() * 10 + 5 + 's';
            particle.style.animationDelay = Math.random() * 10 + 's';
            
            particleContainer.appendChild(particle);
        }
    </script>

</body>
</html>
