<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>devodrag</title>
    <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #ff7e5f, #feb47b, #ffcc33);
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.7);
            --accent-yellow: #ffcc33;
            --particle-color: rgba(255, 204, 51, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Строго без скролла */
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #0f0804;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px; /* Базовое 3D пространство */
        }

        /* Анимированный летний бэкграунд */
        .background-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            filter: blur(80px);
            background: radial-gradient(circle at 50% 50%, #200b00, #0c0502);
        }

        .blob {
            position: absolute;
            background: linear-gradient(45deg, #ff4e50, #f9d423);
            border-radius: 50%;
            mix-blend-mode: screen;
            opacity: 0.4;
            animation: moveBlob 25s ease-in-out infinite alternate;
        }

        .blob:nth-child(1) { width: 500px; height: 500px; top: -10%; left: -10%; background: linear-gradient(135deg, #ff8c00, #e52d27); animation-duration: 20s; }
        .blob:nth-child(2) { width: 450px; height: 450px; bottom: -10%; right: -5%; background: linear-gradient(135deg, #ffcc33, #ffb347); animation-duration: 28s; animation-delay: -5s; }
        .blob:nth-child(3) { width: 300px; height: 300px; top: 40%; left: 50%; background: linear-gradient(135deg, #ff512f, #dd2476); animation-duration: 22s; animation-delay: -10s; }

        @keyframes moveBlob {
            0% { transform: translate(0px, 0px) scale(1); }
            100% { transform: translate(80px, -60px) scale(1.1); }
        }

        /* Частицы */
        .particle-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; }
        .particle { position: absolute; background: var(--particle-color); border-radius: 50%; filter: blur(1px); animation: floatParticle linear infinite; }
        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* Карточка */
        .glass-wrapper {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 420px;
            padding: 35px 25px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 38px;
            backdrop-filter: blur(30px) saturate(210%);
            -webkit-backdrop-filter: blur(30px) saturate(210%);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .element-appear {
            opacity: 0;
            transform: translateY(15px);
            animation: cardAppear 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes cardAppear { to { opacity: 1; transform: translateY(0); } }

        /* Аватар */
        .avatar-holder { position: relative; width: 110px; height: 110px; margin: 0 auto 20px; animation-delay: 0.1s; }
        .avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255, 255, 255, 0.4); position: relative; z-index: 2; }
        .avatar-glow {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #ffcc33, #ff4e50); border-radius: 50%;
            filter: blur(15px); opacity: 0.6; z-index: 1; animation: pulseGlow 4s ease-in-out infinite alternate;
        }
        @keyframes pulseGlow { 0% { transform: scale(0.95); } 100% { transform: scale(1.1); } }

        /* Текст */
        h1 {
            font-size: 2.4em; font-weight: 800; letter-spacing: -0.8px; margin-bottom: 4px;
            background: linear-gradient(180deg, #ffffff 0%, #ffe5b4 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation-delay: 0.2s;
        }
        .tagline { font-size: 1.1em; color: var(--accent-yellow); font-weight: 700; margin-bottom: 6px; animation-delay: 0.3s; }
        .location { font-size: 0.95em; color: var(--text-sub); font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 30px; animation-delay: 0.4s; }

        /* Контейнер кнопок */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            animation-delay: 0.5s;
        }

        /* КНОПКИ С АККУРАТНЫМ 3D */
        .ios-btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 22px;
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-main);
            text-decoration: none;
            font-size: 1.15em;
            font-weight: 700;
            letter-spacing: -0.3px;
            backdrop-filter: blur(10px);
            
            /* Настройки 3D пространства для самой кнопки */
            transform-style: preserve-3d;
            transform: perspective(800px) rotateX(0deg) rotateY(0deg);
            
            /* Анимируем ТОЛЬКО цвета и тени при ховере */
            transition: background-color 0.25s, border-color 0.25s, box-shadow 0.25s;
        }

        /* Эффект легкой многослойности (Параллакс) */
        .ios-btn .left-side, .ios-btn .fa-chevron-right {
            transform: translateZ(15px); /* Аккуратный объем без сильного отрыва */
            backface-visibility: hidden;
        }

        .ios-btn .left-side { display: flex; align-items: center; gap: 14px; }
        .ios-btn i { font-size: 1.3em; }
        .ios-btn .fa-chevron-right { font-size: 0.85em; opacity: 0.4; }

        /* --- НЕОНОВАЯ ПОДСВЕТКА НАВЕДЕНИЯ --- */
        
        /* Telegram */
        .ios-btn-tg:hover {
            background: rgba(0, 136, 204, 0.3);
            border-color: rgba(0, 136, 204, 0.9);
            box-shadow: 
                0 0 25px rgba(0, 136, 204, 0.4), 
                0 10px 35px rgba(0, 136, 204, 0.3),
                inset 0 0 15px rgba(0, 136, 204, 0.3);
        }
        .ios-btn-tg:hover .fa-telegram {
            color: #33b5e5;
            filter: drop-shadow(0 0 8px #0088cc);
        }

        /* GitHub */
        .ios-btn-gh:hover {
            background: rgba(255, 204, 51, 0.2);
            border-color: rgba(255, 204, 51, 0.9);
            box-shadow: 
                0 0 25px rgba(255, 204, 51, 0.3), 
                0 10px 35px rgba(255, 204, 51, 0.25),
                inset 0 0 15px rgba(255, 204, 51, 0.2);
        }
        .ios-btn-gh:hover .fa-github {
            color: var(--accent-yellow);
            filter: drop-shadow(0 0 8px var(--accent-yellow));
        }

        .sunlight {
            position: absolute; top: -20%; right: -20%; width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(255,204,51,0.15) 0%, transparent 70%);
            z-index: 2; pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="background-canvas">
        <div class="blob"></div>
        <div class="blob"></div>
        <div class="blob"></div>
    </div>
    
    <div class="particle-container" id="particles"></div>
    <div class="sunlight"></div>

    <div class="glass-wrapper">
        <div class="avatar-holder element-appear">
            <div class="avatar-glow"></div>
            <img src="avatar.jpg" alt="devodrag" class="avatar" onerror="this.src='https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=150&auto=format&fit=crop&q=80'">
        </div>

        <h1 class="element-appear">devodrag</h1>
        <p class="tagline element-appear">Full Stack Developer</p>
        
        <div class="location element-appear">
            <i class="fas fa-location-dot" style="color: #ff4e50;"></i>
            <span>Latvia</span>
        </div>

        <div class="links-container element-appear">
            <a href="https://t.me/tabyru" target="_blank" class="ios-btn ios-btn-tg tilt-btn">
                <div class="left-side">
                    <i class="fab fa-telegram"></i>
                    <span>Telegram</span>
                </div>
                <i class="fas fa-chevron-right"></i>
            </a>

            <a href="https://github.com/devodrag" target="_blank" class="ios-btn ios-btn-gh tilt-btn">
                <div class="left-side">
                    <i class="fab fa-github"></i>
                    <span>GitHub</span>
                </div>
                <i class="fas fa-chevron-right"></i>
            </a>
        </div>
    </div>

    <script>
        // 1. Генерация частиц
        const particleContainer = document.getElementById('particles');
        const particleCount = 40;
        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 5 + 2 + 'px';
            particle.style.width = size;
            particle.style.height = size;
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.animationDuration = Math.random() * 10 + 5 + 's';
            particle.style.animationDelay = Math.random() * 10 + 's';
            particleContainer.appendChild(particle);
        }

        // 2. Сбалансированный 3D TILT ЭФФЕКТ
        const buttons = document.querySelectorAll('.tilt-btn');

        buttons.forEach(btn => {
            btn.addEventListener('mousemove', (e) => {
                const rect = btn.getBoundingClientRect();
                
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                
                const deltaX = (x - centerX) / centerX;
                const deltaY = (y - centerY) / centerY;
                
                // ИДЕАЛЬНЫЙ БАЛАНС: 15 градусов наклона
                const maxTilt = 15;
                
                const rotateX = -(deltaY * maxTilt).toFixed(2);
                const rotateY = (deltaX * maxTilt).toFixed(2);
                
                btn.style.transition = 'none';
                btn.style.transform = `perspective(800px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.01)`;
            });

            btn.addEventListener('mouseleave', () => {
                btn.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.3s, border-color 0.3s, box-shadow 0.3s';
                btn.style.transform = 'perspective(800px) rotateX(0deg) rotateY(0deg) scale(1)';
            });
        });
    </script>

</body>
</html>
